<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>Монгол зөв бичих</title>
</head>
<body>
  <header class="bar">
    <div class="brand">
      <img class="logo" src="../icons/icon48.png" alt="" />
      <span class="title">Монгол зөв бичих</span>
    </div>
    <span class="status" id="status">Ачаалж байна…</span>
  </header>

  <div class="settings">
    <label class="toggle"><input type="checkbox" id="tgGlobal" /> <span>Идэвхтэй</span></label>
    <label class="toggle"><input type="checkbox" id="tgSite" /> <span id="siteLabel">Энэ сайт дээр</span></label>
    <span class="spacer"></span>
    <button id="ignoreBtn" class="linkbtn" type="button">Миний толь (0)</button>
  </div>

  <div class="ignore-panel" id="ignorePanel" hidden></div>

  <div class="editor">
    <div class="mirror" id="mirror"><div class="mirror-inner" id="mirrorInner"></div></div>
    <textarea id="input" spellcheck="false" placeholder="Энд монгол бичвэрээ оруулна уу..."></textarea>
  </div>

  <footer class="bar foot">
    <span id="summary">&nbsp;</span>
    <button id="clear" type="button">Цэвэрлэх</button>
  </footer>

  <div class="tip" id="tip" hidden></div>

  <script src="../dist/popup.js"></script>
</body>
</html>
