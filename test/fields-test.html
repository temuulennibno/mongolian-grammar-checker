<!doctype html><html><head><meta charset="utf-8"><title>MN field test</title>
<link rel="stylesheet" href="/src/content.css">
<style>
  body{font-family:Georgia,serif;max-width:760px;margin:24px auto;padding:0 16px}
  h2{font-size:15px;color:#333;margin:20px 0 6px}
  textarea,input{width:100%;font-size:18px;padding:10px;box-sizing:border-box}
  textarea{height:90px}
  .ce{border:1px solid #bbb;border-radius:6px;padding:10px;font-size:18px;min-height:60px;line-height:1.6}
</style></head>
<body>
  <h1>Mongolian spell-check · field test</h1>
  <h2>contenteditable div</h2>
  <div id="ce" class="ce" contenteditable="true">Сайн байна уу Монггол улсын иргэн</div>
  <h2>textarea</h2>
  <textarea id="ta">Энэ бол тестийн өгүүлбэр бөгөөд алдаатай үг яаххав байна</textarea>
  <h2>input</h2>
  <input id="inp" type="text" value="хаашаа явналаа">
  <!-- setup (chrome stub + engine) MUST load before the content script -->
  <script src="/test/fields-setup.bundle.js"></script>
  <script src="/dist/content.js"></script>
</body></html>
